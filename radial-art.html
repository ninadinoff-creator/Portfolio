<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radial Burst</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
    font-family: -apple-system, system-ui, sans-serif;
  }

  .artwork-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
  }

  canvas {
    background: #fff;
    cursor: crosshair;
    touch-action: none;
    display: block;
  }

  /* --- Dot controls --- */
  .dot-controls {
    display: flex;
    flex-direction: row;
    gap: 7px;
    padding-top: 8px;
    order: 2;
  }

  .dot-ctrl {
    position: relative;
    display: flex;
    align-items: center;
  }

  .dot-ctrl .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #222;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }

  .dot-ctrl:hover .dot,
  .dot-ctrl.active .dot {
    transform: scale(1.4);
  }

  .dot-ctrl .slider-panel {
    position: absolute;
    left: 50%;
    bottom: auto;
    top: 100%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(255,255,255,0.97);
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot-ctrl:hover .slider-panel,
  .dot-ctrl.active .slider-panel {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(4px);
  }

  .slider-panel .ctrl-label {
    font-size: 10px;
    color: #888;
    min-width: 48px;
  }

  .slider-panel input[type="range"] {
    width: 90px;
    margin: 0;
    accent-color: #555;
    height: 12px;
  }

  .slider-panel .ctrl-val {
    font-size: 10px;
    font-weight: 600;
    color: #333;
    min-width: 28px;
    text-align: right;
  }

  @media (max-width: 480px) {
    body {
      align-items: flex-start;
      padding-top: 12px;
    }

    .artwork-wrapper {
      flex-direction: column;
      width: 100%;
      padding: 0;
      align-items: center;
    }

    .dot-controls {
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 0;
      padding: 8px 0;
      order: 2;
    }

    .dot-ctrl {
      position: relative;
    }

    .dot-ctrl .dot {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border-radius: 50%;
    }

    .dot-ctrl .dot::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #222;
      display: block;
    }

    .dot-ctrl .slider-panel {
      display: none;
    }

    .mobile-slider {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.97);
      border: 1px solid #ddd;
      border-radius: 8px;
      margin: 0 12px;
      order: 3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .mobile-slider .ctrl-label {
      font-size: 11px;
      color: #888;
      min-width: 44px;
    }

    .mobile-slider input[type="range"] {
      flex: 1;
      margin: 0;
      accent-color: #555;
      height: 14px;
    }

    .mobile-slider .ctrl-val {
      font-size: 11px;
      font-weight: 600;
      color: #333;
      min-width: 32px;
      text-align: right;
    }
  }
</style>
</head>
<body>

<div class="artwork-wrapper">
  <div class="dot-controls">
    <div class="dot-ctrl" data-ctrl="reach">
      <div class="dot"></div>
      <div class="slider-panel">
        <span class="ctrl-label">reach</span>
        <input type="range" id="s-reach" min="15" max="120" value="50" step="1">
        <span class="ctrl-val" id="v-reach">50</span>
      </div>
    </div>

    <div class="dot-ctrl" data-ctrl="strength">
      <div class="dot"></div>
      <div class="slider-panel">
        <span class="ctrl-label">push</span>
        <input type="range" id="s-strength" min="0.1" max="5" value="1.2" step="0.1">
        <span class="ctrl-val" id="v-strength">1.2</span>
      </div>
    </div>

    <div class="dot-ctrl" data-ctrl="maxpush">
      <div class="dot"></div>
      <div class="slider-panel">
        <span class="ctrl-label">max</span>
        <input type="range" id="s-maxpush" min="3" max="40" value="12" step="1">
        <span class="ctrl-val" id="v-maxpush">12</span>
      </div>
    </div>

    <div class="dot-ctrl" data-ctrl="spring">
      <div class="dot"></div>
      <div class="slider-panel">
        <span class="ctrl-label">return</span>
        <input type="range" id="s-spring" min="0.002" max="0.05" value="0.008" step="0.002">
        <span class="ctrl-val" id="v-spring">0.008</span>
      </div>
    </div>

    <div class="dot-ctrl" data-ctrl="damping">
      <div class="dot"></div>
      <div class="slider-panel">
        <span class="ctrl-label">smooth</span>
        <input type="range" id="s-damping" min="0.9" max="0.995" value="0.95" step="0.005">
        <span class="ctrl-val" id="v-damping">0.95</span>
      </div>
    </div>

    <div class="dot-ctrl" data-ctrl="drift">
      <div class="dot"></div>
      <div class="slider-panel">
        <span class="ctrl-label">drift</span>
        <input type="range" id="s-drift" min="0.92" max="0.995" value="0.97" step="0.005">
        <span class="ctrl-val" id="v-drift">0.97</span>
      </div>
    </div>

    <div class="dot-ctrl" data-ctrl="density">
      <div class="dot"></div>
      <div class="slider-panel">
        <span class="ctrl-label">density</span>
        <input type="range" id="s-density" min="0.4" max="2.0" value="0.8" step="0.1">
        <span class="ctrl-val" id="v-density">0.8</span>
      </div>
    </div>

    <div class="dot-ctrl" data-ctrl="spread">
      <div class="dot"></div>
      <div class="slider-panel">
        <span class="ctrl-label">gaps</span>
        <input type="range" id="s-spread" min="0" max="1.5" value="1" step="0.05">
        <span class="ctrl-val" id="v-spread">1</span>
      </div>
    </div>
  </div>

  <canvas id="c"></canvas>
  <div class="mobile-slider" id="mobile-slider" style="display:none;">
    <span class="ctrl-label" id="ms-label">reach</span>
    <input type="range" id="ms-range">
    <span class="ctrl-val" id="ms-val">50</span>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // --- Config ---
  const BASE_SIZE = 400;
  let size = BASE_SIZE;
  let dpr = window.devicePixelRatio || 1;
  let cx, cy;

  const RING_COUNT = 7;
  const CENTER_HOLE_RATIO = 0.032;
  const MAX_RADIUS_RATIO = 0.44;
  const GAP_RATIO = 0.004;
  let SPREAD = 1.0;              // 1 = full size, 0.5 = half size, rings squeezed toward center

  const LINE_ALPHA = 0.42;
  const LINE_WIDTH_MIN = 0.4;
  const LINE_WIDTH_MAX = 1.2;

  const RING_LOAD_DURATION = 700;
  const RING_LOAD_STAGGER = 250;

  const RING_NOISE_OCTAVES = 3;
  const RING_NOISE_AMP = 0.35;

  // --- Tunable params ---
  let REPULSE_RADIUS = 50;
  let REPULSE_STRENGTH = 1.2;
  let MAX_RADIAL_PUSH = 12;
  let SPRING = 0.008;          // slower return spring
  let DAMPING = 0.95;
  let RETURN_DRAG = 0.97;      // extra drag on the way back (higher = driftier)
  let DENSITY = 0.8;

  function ringNoise(angle, ringIndex, layer) {
    let val = 0, amp = 1, freq = 1;
    for (let o = 0; o < RING_NOISE_OCTAVES; o++) {
      const phase = (ringIndex * 73.17 + layer * 137.31 + o * 51.7);
      val += amp * Math.sin(angle * (3 + o * 2) * freq + phase);
      val += amp * 0.5 * Math.sin(angle * (7 + o * 3) * freq + phase * 1.3);
      amp *= 0.5;
      freq *= 1.8;
    }
    return val / 2.5;
  }

  // --- State ---
  let lines = [];
  let mouse = { x: -9999, y: -9999, active: false };
  let loadStartTime = 0;

  // --- Line class ---
  class Line {
    constructor(ring, angle, innerR, outerR, isOuterEdge) {
      this.ring = ring;
      this.angle = angle + (Math.random() - 0.5) * 0.06;

      const span = outerR - innerR;
      const lenVar = 0.6 + Math.random() * 0.4;
      this.baseInnerR = innerR + (Math.random() - 0.5) * 2;
      this.baseOuterR = innerR + span * lenVar + (Math.random() - 0.5) * 1.5;

      if (Math.random() < 0.25) this.baseOuterR += span * 0.3 * Math.random();
      if (Math.random() < 0.2) this.baseInnerR -= span * 0.25 * Math.random();

      if (isOuterEdge) this.baseOuterR *= 0.82 + Math.random() * 0.22;

      this.radialOffset = 0;
      this.radialVel = 0;
      this.breathePhase = Math.random() * Math.PI * 2;
      this.breatheSpeed = 0.0004 + Math.random() * 0.0003;
      this.breatheAmp = 0.4 + Math.random() * 0.6;

      this.cosA = Math.cos(this.angle);
      this.sinA = Math.sin(this.angle);

      this.width = LINE_WIDTH_MIN + Math.random() * (LINE_WIDTH_MAX - LINE_WIDTH_MIN);
      this.alpha = LINE_ALPHA * (0.6 + Math.random() * 0.8);
      this.loadProgress = 0;
    }

    update(now) {
      const ringStart = loadStartTime + this.ring * RING_LOAD_STAGGER;
      const elapsed = now - ringStart;
      if (elapsed < 0) { this.loadProgress = 0; return; }
      if (elapsed < RING_LOAD_DURATION) {
        const t = elapsed / RING_LOAD_DURATION;
        this.loadProgress = 1 - Math.pow(1 - t, 3);
      } else {
        this.loadProgress = 1;
      }

      // Gentle ambient breathing
      const breathe = Math.sin(now * this.breatheSpeed + this.breathePhase);
      this.radialVel += breathe * this.breatheAmp * 0.002;

      // Repulsion — push outward along radial axis only
      if (mouse.active) {
        const midR = (this.baseInnerR + this.baseOuterR) / 2 + this.radialOffset;
        const midX = cx + this.cosA * midR;
        const midY = cy + this.sinA * midR;
        const dx = midX - mouse.x;
        const dy = midY - mouse.y;
        const distSq = dx * dx + dy * dy;
        const radiusSq = REPULSE_RADIUS * REPULSE_RADIUS;
        if (distSq < radiusSq && distSq > 0.01) {
          const dist = Math.sqrt(distSq);
          const t = 1 - dist / REPULSE_RADIUS;
          const falloff = t * t * (3 - 2 * t);
          const radialDot = (dx / dist) * this.cosA + (dy / dist) * this.sinA;
          const outward = Math.max(0, radialDot);
          this.radialVel += outward * falloff * REPULSE_STRENGTH;
        }
      }

      // Asymmetric: bounce out fast, return at 1/3 the rate
      const isReturning = (this.radialOffset > 0 && this.radialVel < 0) ||
                          (this.radialOffset > 0.5 && !mouse.active);
      const springForce = isReturning ? SPRING / 3 : SPRING;
      this.radialVel -= this.radialOffset * springForce;
      this.radialVel *= isReturning ? DAMPING * RETURN_DRAG : DAMPING;
      this.radialOffset += this.radialVel;

      if (this.radialOffset > MAX_RADIAL_PUSH) {
        this.radialOffset = MAX_RADIAL_PUSH;
        this.radialVel *= 0.3;
      }
      if (this.radialOffset < -1) {
        this.radialOffset = -1;
        this.radialVel *= 0.3;
      }
    }

    draw(ctx) {
      if (this.loadProgress <= 0.01) return;

      const p = this.loadProgress;
      const ro = this.radialOffset;

      const x1 = cx + this.cosA * (this.baseInnerR + ro);
      const y1 = cy + this.sinA * (this.baseInnerR + ro);
      const fx2 = cx + this.cosA * (this.baseOuterR + ro);
      const fy2 = cy + this.sinA * (this.baseOuterR + ro);

      const x2 = x1 + (fx2 - x1) * p;
      const y2 = y1 + (fy2 - y1) * p;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = `rgba(15, 12, 10, ${this.alpha * p})`;
      ctx.lineWidth = this.width;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  // --- Generate lines ---
  function generateLines() {
    lines = [];
    const centerHole = size * CENTER_HOLE_RATIO;
    const fullMaxRadius = size * MAX_RADIUS_RATIO;
    // Structure shrinks as gaps decrease
    const maxRadius = centerHole + (fullMaxRadius - centerHole) * (0.5 + SPREAD * 0.5);
    const totalSpan = maxRadius - centerHole;
    const ringWidth = totalSpan / RING_COUNT;
    const gap = size * GAP_RATIO;

    for (let r = 0; r < RING_COUNT; r++) {
      const nominalInner = centerHole + r * ringWidth;
      const nominalOuter = centerHole + (r + 1) * ringWidth;
      const isOuterEdge = (r >= RING_COUNT - 2);
      const isOuterFive = (r >= 2);

      // SPREAD controls all white gaps: 1 = full gaps, 0 = no gaps (rings merge)
      let ringGap = isOuterFive ? 0 : gap * SPREAD;
      const extraGapAtBoundary = size * 0.018 * SPREAD;
      if (r === 2) ringGap = gap * SPREAD;
      if (r === 3) ringGap = extraGapAtBoundary;

      const thisRingWidth = nominalOuter - nominalInner;
      const avgR = (nominalInner + nominalOuter) / 2;
      const circumference = 2 * Math.PI * avgR;
      const d = isOuterEdge ? Math.max(0.4, DENSITY - 0.15) : DENSITY;
      const count = Math.floor(circumference / d);

      for (let i = 0; i < count; i++) {
        const baseAngle = (i / count) * Math.PI * 2;
        const jitter = (Math.random() - 0.5) * (Math.PI * 2 / count) * 0.6;
        const angle = baseAngle + jitter;

        const noiseInner = ringNoise(angle, r, 0) * RING_NOISE_AMP * thisRingWidth;
        const noiseOuter = ringNoise(angle, r, 1) * RING_NOISE_AMP * thisRingWidth;

        const innerR = nominalInner + ringGap + noiseInner;
        const outerR = nominalOuter - ringGap + noiseOuter;

        lines.push(new Line(r, angle, innerR, outerR, isOuterEdge));
      }

      // More bleed-through as spread decreases (gaps close = more overlap)
      const atBoundary = (r === 2 || r === 3);
      const overlapBoost = 1 + (1 - SPREAD) * 2; // more extras as gaps shrink
      const baseRatio = atBoundary ? 0.06 : (isOuterFive ? 0.3 : 0.12);
      const extraRatio = baseRatio * overlapBoost;
      const extras = Math.floor(count * extraRatio);
      for (let i = 0; i < extras; i++) {
        const angle = Math.random() * Math.PI * 2;
        const noiseInner = ringNoise(angle, r, 0) * RING_NOISE_AMP * thisRingWidth;
        const noiseOuter = ringNoise(angle, r, 1) * RING_NOISE_AMP * thisRingWidth;
        const bleedIn = atBoundary ? gap * 0.5 : (isOuterFive ? gap * 4 : gap * 1.5);
        const bleedOut = atBoundary ? gap * 0.5 : (isOuterFive ? gap * 3 : gap * 1.0);
        const innerR = nominalInner - bleedIn + noiseInner;
        const outerR = nominalOuter + bleedOut + noiseOuter;
        lines.push(new Line(r, angle, innerR, outerR, false));
      }
    }
  }

  // --- Resize ---
  function resize() {
    const isMobile = window.innerWidth <= 480;
    const maxW = isMobile ? window.innerWidth - 16 : BASE_SIZE;
    const maxH = isMobile ? window.innerHeight - 100 : BASE_SIZE;
    size = Math.min(BASE_SIZE, maxW, maxH);

    dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    cx = size / 2;
    cy = size / 2;

    generateLines();
    loadStartTime = performance.now();
  }

  // --- Input ---
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = size / rect.width;
    const scaleY = size / rect.height;
    if (e.touches && e.touches.length > 0) {
      return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
    }
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  canvas.addEventListener('mousemove', (e) => { const p = getPos(e); mouse.x = p.x; mouse.y = p.y; mouse.active = true; });
  canvas.addEventListener('mouseleave', () => { mouse.active = false; mouse.x = -9999; mouse.y = -9999; });
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const p = getPos(e); mouse.x = p.x; mouse.y = p.y; mouse.active = true; }, { passive: false });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const p = getPos(e); mouse.x = p.x; mouse.y = p.y; mouse.active = true; }, { passive: false });
  canvas.addEventListener('touchend', () => { mouse.active = false; mouse.x = -9999; mouse.y = -9999; });

  // --- Dot controls ---
  function bindSlider(id, valId, setter) {
    const slider = document.getElementById(id);
    const valEl = document.getElementById(valId);
    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      valEl.textContent = v;
      setter(v);
    });
  }

  bindSlider('s-reach', 'v-reach', (v) => { REPULSE_RADIUS = v; });
  bindSlider('s-strength', 'v-strength', (v) => { REPULSE_STRENGTH = v; });
  bindSlider('s-maxpush', 'v-maxpush', (v) => { MAX_RADIAL_PUSH = v; });
  bindSlider('s-spring', 'v-spring', (v) => { SPRING = v; });
  bindSlider('s-damping', 'v-damping', (v) => { DAMPING = v; });
  bindSlider('s-drift', 'v-drift', (v) => { RETURN_DRAG = v; });
  bindSlider('s-density', 'v-density', (v) => { DENSITY = v; generateLines(); loadStartTime = performance.now() - 5000; });
  bindSlider('s-spread', 'v-spread', (v) => { SPREAD = v; generateLines(); loadStartTime = performance.now() - 5000; });

  // Mobile slider wiring
  const mobileSlider = document.getElementById('mobile-slider');
  const msRange = document.getElementById('ms-range');
  const msLabel = document.getElementById('ms-label');
  const msVal = document.getElementById('ms-val');
  let activeMobileCtrl = null;

  function isMobile() { return window.innerWidth <= 480; }

  function showMobileSlider(ctrlName) {
    const dotCtrl = document.querySelector(`.dot-ctrl[data-ctrl="${ctrlName}"]`);
    const slider = dotCtrl.querySelector('input[type="range"]');
    const label = dotCtrl.querySelector('.ctrl-label').textContent;

    msLabel.textContent = label;
    msRange.min = slider.min;
    msRange.max = slider.max;
    msRange.step = slider.step;
    msRange.value = slider.value;
    msVal.textContent = slider.value;
    activeMobileCtrl = ctrlName;
    mobileSlider.style.display = 'flex';

    msRange.oninput = () => {
      slider.value = msRange.value;
      slider.dispatchEvent(new Event('input'));
      msVal.textContent = parseFloat(msRange.value);
    };
  }

  // Touch support for dots: tap to toggle active state
  document.querySelectorAll('.dot-ctrl .dot').forEach(dot => {
    dot.addEventListener('click', (e) => {
      const parent = dot.closest('.dot-ctrl');
      const ctrlName = parent.dataset.ctrl;
      const wasActive = parent.classList.contains('active');
      // close all
      document.querySelectorAll('.dot-ctrl.active').forEach(el => el.classList.remove('active'));
      // toggle this one
      if (!wasActive) {
        parent.classList.add('active');
        if (isMobile()) showMobileSlider(ctrlName);
      } else {
        mobileSlider.style.display = 'none';
        activeMobileCtrl = null;
      }
    });
  });

  // Close active dot control when clicking elsewhere
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dot-ctrl') && !e.target.closest('.mobile-slider')) {
      document.querySelectorAll('.dot-ctrl.active').forEach(el => el.classList.remove('active'));
      mobileSlider.style.display = 'none';
      activeMobileCtrl = null;
    }
  });

  // --- Animation loop ---
  function frame(now) {
    ctx.clearRect(0, 0, size, size);
    for (let i = 0; i < lines.length; i++) lines[i].update(now);
    for (let i = 0; i < lines.length; i++) lines[i].draw(ctx);
    requestAnimationFrame(frame);
  }

  // --- Init ---
  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
